<!DOCTYPE html>
<html lang="es">
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Banco Los Andes - Fuerza de Ventas. Cartera, solicitudes, evaluacion y cobranza.">
  <meta name="theme-color" content="#00C1F9">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Los Andes Ventas">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Banco Los Andes - Fuerza de Ventas</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      background: #051424;
    }
    .boot-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #89d9ff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      gap: 16px;
    }
    .boot-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(137, 217, 255, 0.25);
      border-top-color: #00c1f9;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="boot-loader" class="boot-loader">
    <div class="boot-spinner" aria-hidden="true"></div>
    <div>Cargando Fuerza de Ventas...</div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('boot-loader');
      if (loader) loader.remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
